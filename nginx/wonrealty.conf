# WebSocket 업그레이드 매핑 (Portainer 콘솔/실시간 통계용)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name wonrealty.kr www.wonrealty.kr;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name wonrealty.kr www.wonrealty.kr;
    ssl_certificate     /etc/letsencrypt/live/wonrealty.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wonrealty.kr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    client_max_body_size 50M;
    proxy_read_timeout   300s;

    location /health {
        proxy_pass http://backend:8001/health;
    }

    location /api/ {
        proxy_pass         http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_buffering    off;
    }

    # 콘텐츠 해시 자산(/assets/index-XXXX.js·css): 파일명이 바뀌므로 불변 장기 캐시
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        # index.html은 항상 재검증 → 재빌드 시 새 번들 즉시 반영(옛 화면 캐싱 방지)
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    }
}

# ===== Portainer (portainer.wonrealty.kr → portainer:9000) =====
server {
    listen 80;
    server_name portainer.wonrealty.kr;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name portainer.wonrealty.kr;
    ssl_certificate     /etc/letsencrypt/live/wonrealty.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wonrealty.kr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    client_max_body_size 100M;

    location / {
        proxy_pass         http://portainer:9000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_buffering    off;
        proxy_read_timeout 600s;
    }
}
